<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>重要讲话</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--accent:#5865f2;--border:rgba(0,0,0,.06);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
.nav{position:sticky;top:0;z-index:100;background:rgba(245,245,247,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-badge{font-size:.68em;padding:5px 12px;border-radius:20px;background:#fff;border:1px solid var(--border);color:var(--sub)}
.main{max-width:1100px;margin:0 auto;padding:28px 24px 40px}
.hero h1{font-size:1.3em;font-weight:800;letter-spacing:-.3px}.hero p{font-size:.76em;color:var(--sub);margin-top:2px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
@media(max-width:768px){.tabs{grid-template-columns:repeat(2,1fr)}}
#timeTabs{display:flex;gap:8px}#timeTabs .tab{padding:10px 16px;border-radius:14px;flex-direction:row;gap:6px}#timeTabs .tab .ticon{width:28px;height:28px;border-radius:8px;font-size:.85em}#timeTabs .tab .tname{font-size:.76em}#timeTabs .tab .tdesc{display:none}
.tab{background:var(--card);border-radius:18px;padding:18px 14px;cursor:pointer;transition:all .3s cubic-bezier(.25,.1,.25,1);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:center;gap:12px}
.tab:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.08);border-color:rgba(88,101,242,.25)}
.tab:active{transform:scale(.98)}
.tab .ticon{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1em;background:#f0f4ff}
.tab.active{background:#fafaff;border-color:var(--accent);box-shadow:0 4px 16px rgba(88,101,242,.15)}
.tab.active .ticon{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff}
.tab .tname{font-size:.8em;font-weight:700;letter-spacing:-.2px}
.tab .tdesc{font-size:.62em;color:var(--sub);margin-top:2px}
.list-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);overflow-y:auto;height:55vh;-ms-overflow-style:none;scrollbar-width:none}.list-card::-webkit-scrollbar{display:none}
.item{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(0,0,0,.03);transition:all .2s ease;cursor:default}
.item:hover{background:#f8faff;transform:translateX(3px);box-shadow:inset 3px 0 0 var(--accent)}
.item:active{transform:scale(.99)}
.item .info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.item .icon{width:38px;height:38px;border-radius:10px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.item:hover .icon{background:#e0e8ff}
.item .name{font-size:.85em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.item .cat{font-size:.68em;padding:3px 10px;border-radius:8px;background:#f0f4ff;color:var(--accent)}
.dl-btn{padding:8px 16px;border-radius:10px;font-size:.72em;font-weight:700;cursor:pointer;border:0;background:var(--accent);color:#fff;transition:all .2s;display:flex;align-items:center;gap:4px;flex-shrink:0;box-shadow:0 2px 6px rgba(88,101,242,.2)}
.dl-btn:hover{background:linear-gradient(135deg,var(--accent),#8b5cf6);transform:translateY(-1px);box-shadow:0 4px 12px rgba(88,101,242,.3)}
.count{font-size:.7em;color:var(--sub);margin-bottom:8px}
.empty{text-align:center;padding:60px;color:var(--sub);font-size:.82em}
.pg-btn{padding:10px 24px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.82em;font-weight:700;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}.pg-btn:hover{border-color:var(--accent);color:var(--accent)}.pg-btn:disabled{opacity:.25;cursor:not-allowed}.pg-info{font-size:.85em;font-weight:700}.footer{text-align:center;padding:30px;color:#b0b0b8;font-size:.65em;border-top:1px solid var(--border)}
</style></head><body>

<nav class="nav"><div class="nav-inner"><div style="font-size:.88em;font-weight:700"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-4px;margin-right:4px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>重要讲话</div><div class="nav-badge">公考备考资料</div></div></nav>

<div class="main">
  <div class="hero"><h1>重要讲话</h1><p>公考重要讲话资料下载</p></div>

  <!-- Time filter -->
  <div class="tabs" id="timeTabs">

    <div class="tab" data-t="2027" onclick="filter('t','2027',this)"><div class="ticon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="tname">2027年</div><div class="tdesc">最新讲话</div></div></div>
    <div class="tab" data-t="2026" onclick="filter('t','2026',this)"><div class="ticon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="tname">2026年</div><div class="tdesc">年度讲话</div></div></div>
    <div class="tab active" data-t="2025" onclick="filter('t','2025',this)"><div class="ticon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="tname">2025年</div><div class="tdesc">年度讲话</div></div></div>
  </div>

  <!-- Category filter -->
  <div class="tabs" id="catTabs">
    <div class="tab active" data-c="all" onclick="filter('c','all',this)"><div class="ticon" style="background:#eef2ff;color:#5865f2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div><div><div class="tname">全部分类</div><div class="tdesc">所有讲话</div></div></div>
    <div class="tab" data-c="新年讲话" onclick="filter('c','新年讲话',this)"><div class="ticon" style="background:#fef2f2;color:#ef4444"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg></div><div><div class="tname">新年讲话</div><div class="tdesc">新年贺词</div></div></div>
    <div class="tab" data-c="外交讲话" onclick="filter('c','外交讲话',this)"><div class="ticon" style="background:#eff6ff;color:#3b82f6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div><div><div class="tname">外交讲话</div><div class="tdesc">国际关系</div></div></div>
    <div class="tab" data-c="党建讲话" onclick="filter('c','党建讲话',this)"><div class="ticon" style="background:#fefce8;color:#ca8a04"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div><div><div class="tname">党建讲话</div><div class="tdesc">党的建设</div></div></div>
    <div class="tab" data-c="经济讲话" onclick="filter('c','经济讲话',this)"><div class="ticon" style="background:#f0fdf4;color:#16a34a"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></div><div><div class="tname">经济讲话</div><div class="tdesc">经济发展</div></div></div>
    <div class="tab" data-c="民生讲话" onclick="filter('c','民生讲话',this)"><div class="ticon" style="background:#fdf2f8;color:#ec4899"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div><div><div class="tname">民生讲话</div><div class="tdesc">民生福祉</div></div></div>
    <div class="tab" data-c="法治讲话" onclick="filter('c','法治讲话',this)"><div class="ticon" style="background:#eef2ff;color:#6366f1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div><div><div class="tname">法治讲话</div><div class="tdesc">依法治国</div></div></div>
    <div class="tab" data-c="生态讲话" onclick="filter('c','生态讲话',this)"><div class="ticon" style="background:#ecfdf5;color:#059669"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div><div class="tname">生态讲话</div><div class="tdesc">生态文明</div></div></div>
    <div class="tab" data-c="军队讲话" onclick="filter('c','军队讲话',this)"><div class="ticon" style="background:#f1f5f9;color:#475569"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg></div><div><div class="tname">军队讲话</div><div class="tdesc">强军兴军</div></div></div>
    <div class="tab" data-c="青年讲话" onclick="filter('c','青年讲话',this)"><div class="ticon" style="background:#fff7ed;color:#f97316"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div><div class="tname">青年讲话</div><div class="tdesc">青年发展</div></div></div>
  </div>

  <div class="list-card" id="listCard"></div>
  <div class="pagination" id="pagination" style="display:flex;justify-content:center;align-items:center;gap:20px;margin-top:16px">
    <button class="pg-btn" onclick="goPage(-1)" id="btnPrev">&lt; 上一页</button>
    <span class="pg-info" id="pageInfo">1 / 1</span>
    <button class="pg-btn" onclick="goPage(1)" id="btnNext">下一页 &gt;</button>
  </div>
</div>

<footer class="footer">公考重要讲话资料 · 仅供学习参考</footer>

<script>
// ====== DATA ======
var DB=[]; // 后续填充数据

// Sample data for testing
DB.push({id:1,title:"习近平发表二〇二七年新年贺词",cat:"新年讲话",year:"2027",content:"同志们，朋友们：\n\n新年的钟声即将敲响。在这辞旧迎新的美好时刻，我向大家致以新年的祝福！\n\n过去的一年极为重要。我们以中国式现代化全面推进中华民族伟大复兴。\n\n面向未来，团结就是力量，信心赛过黄金！"});

// ====== STATE ======
var curT='2025',curC='all',curPage=0,perPage=12;

function filter(type,val,el){
  if(type==='t'){curT=val;document.querySelectorAll('#timeTabs .tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active')}
  else{curC=val;document.querySelectorAll('#catTabs .tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active')}
  curPage=0;render();
}

function goPage(dir){curPage+=dir;render()}

function getFiltered(){
  return DB.filter(function(item){
    if(curT!=='all'&&item.year!==curT)return false;
    if(curC!=='all'&&item.cat!==curC)return false;
    return true;
  });
}

function downloadSpeech(id){
  var item=DB.find(function(x){return x.id===id});
  if(!item){alert('未找到');return}
  var html='<html><head><meta charset="UTF-8"></head><body style="font-family:SimSun;font-size:14px;line-height:2;padding:20px"><h2>'+item.title+'</h2>'+item.content.replace(/\n/g,'<br>')+'</body></html>';
  var blob=new Blob([html],{type:'application/msword'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=item.title+'.doc';
  a.click();
  URL.revokeObjectURL(a.href);
}

function render(){
  var pool=getFiltered();
  var pages=Math.ceil(pool.length/perPage)||1;
  if(curPage>=pages)curPage=pages-1;
  if(curPage<0)curPage=0;
  var start=curPage*perPage;
  var pageItems=pool.slice(start,start+perPage);
  document.getElementById('pageInfo').textContent=(curPage+1)+' / '+pages;
  document.getElementById('btnPrev').disabled=curPage<=0;
  document.getElementById('btnNext').disabled=curPage>=pages-1;
  if(!pageItems.length){document.getElementById('listCard').innerHTML='<div class="empty">暂无数据</div>';return}
  var html='';
  pageItems.forEach(function(item){
    html+='<div class="item"><div class="info"><div class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5865f2" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="name">'+item.title+'</div></div><div class="meta"><span class="cat">'+item.cat+'</span><button class="dl-btn" onclick="downloadSpeech('+item.id+')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载</button></div></div>';
  });
  document.getElementById('listCard').innerHTML=html;
}

render();
</script></body></html>
